<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Map Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CONFIG: paste your deployed Apps Script /exec URL below.
   Until you do, the dashboard shows a setup notice instead of data.
   ================================================================ */

/* ---- Per-school color variable sets. The full set swaps when the
        school selector changes (data-school attribute on .app). ---- */
.app[data-school="MCA"]{
  --bg:#0a0a0a; --surface:#171514; --surface2:#211d1a; --line:#332b27;
  --primary:#8B1A1A; --primary-soft:#b23636; --accent:#C9A84C;
  --text:#f6f0e4; --muted:#b9ad99;
}
.app[data-school="TGE"]{
  --bg:#08130d; --surface:#10221a; --surface2:#173025; --line:#264334;
  --primary:#1f7a52; --primary-soft:#2f9c6c; --accent:#C9A84C;
  --text:#eef6ef; --muted:#a8c2b3;
}
.app[data-school="MCMS"]{
  /* MCMS Buccaneers: red / gold / black, confirmed from the logo.
     Slightly brighter red than MCA so the two schools stay distinct. */
  --bg:#0a0807; --surface:#1a1310; --surface2:#251a15; --line:#3a2b23;
  --primary:#a01f1f; --primary-soft:#c64242; --accent:#C9A84C;
  --text:#f6f0e4; --muted:#bdae9c;
}

/* ---- Semantic status colors (constant across schools) ---- */
:root{
  --ok:#3aa564; --warn:#d68a35; --bad:#c0413a; --none:#5f5a52;
  --ok-bg:rgba(58,165,100,.14); --warn-bg:rgba(214,138,53,.14);
  --bad-bg:rgba(192,65,58,.14);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Crimson Pro',Georgia,serif;
  font-size:17px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.app{
  background:var(--bg);
  min-height:100vh;
  transition:background .4s ease;
  background-image:
    radial-gradient(circle at 15% 0%, color-mix(in srgb, var(--primary) 22%, transparent), transparent 40%),
    radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 35%);
}
.wrap{max-width:1240px;margin:0 auto;padding:0 26px 70px}

/* ---------------- HEADER ---------------- */
header.masthead{
  padding:30px 0 22px;
  border-bottom:1px solid var(--line);
  margin-bottom:26px;
}
.head-top{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.crest{
  width:74px;height:74px;flex:0 0 auto;border-radius:50%;
  background:var(--surface2);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 6px 22px rgba(0,0,0,.45);
}
.crest img{width:100%;height:100%;object-fit:cover}
.crest .mono{
  font-family:'Cinzel',serif;font-weight:900;font-size:1.5rem;
  color:var(--accent);letter-spacing:.5px;
}
.head-titles{flex:1 1 320px;min-width:240px}
.school-name{
  font-family:'Cinzel',serif;font-weight:700;
  font-size:1.9rem;line-height:1.1;color:var(--text);letter-spacing:.5px;
}
.dash-sub{
  font-family:'Cinzel',serif;font-weight:400;letter-spacing:3px;
  text-transform:uppercase;font-size:.72rem;color:var(--accent);margin-top:6px;
}
.head-meta{
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  text-align:right;
}
.year-pill{
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:1.5px;
  border:1px solid var(--accent);color:var(--accent);
  padding:5px 12px;border-radius:2px;
}
.updated{font-size:.86rem;color:var(--muted)}
.refresh{
  background:transparent;border:1px solid var(--line);color:var(--muted);
  font-family:'Crimson Pro',serif;font-size:.86rem;cursor:pointer;
  padding:5px 12px;border-radius:4px;transition:.2s;
}
.refresh:hover{border-color:var(--accent);color:var(--accent)}

/* ---- school selector tabs ---- */
.selector{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap}
.selector button{
  font-family:'Cinzel',serif;font-weight:600;font-size:.82rem;letter-spacing:2px;
  background:var(--surface);color:var(--muted);
  border:1px solid var(--line);border-radius:4px;
  padding:10px 22px;cursor:pointer;transition:.22s;
}
.selector button:hover{color:var(--text);border-color:var(--primary-soft)}
.selector button.active{
  background:var(--primary);color:#fff;border-color:var(--primary);
  box-shadow:0 4px 16px color-mix(in srgb, var(--primary) 45%, transparent);
}

/* ---------------- SECTION SHELL ---------------- */
.section{margin-top:34px}
.section-title{
  font-family:'Cinzel',serif;font-weight:600;font-size:1.05rem;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.section-title::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------------- SUMMARY CARDS ---------------- */
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-top:3px solid var(--primary);
  border-radius:6px;padding:18px 16px;position:relative;overflow:hidden;
}
.card .val{
  font-family:'Cinzel',serif;font-weight:700;font-size:2.4rem;
  line-height:1;color:var(--text);
}
.card .lbl{
  font-size:.82rem;color:var(--muted);margin-top:8px;letter-spacing:.3px;
  text-transform:uppercase;
}
.card.accent{border-top-color:var(--accent)}
.card.accent .val{color:var(--accent)}

/* ---------------- ALERTS ---------------- */
.alerts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert-box{
  background:var(--surface);border:1px solid var(--line);border-radius:6px;
  padding:18px 20px;
}
.alert-box h3{
  font-family:'Cinzel',serif;font-weight:600;font-size:.92rem;letter-spacing:1px;
  margin-bottom:12px;display:flex;align-items:center;gap:9px;
}
.alert-box.missing h3{color:var(--bad)}
.alert-box.todo h3{color:var(--warn)}
.alert-box ul{list-style:none;display:flex;flex-direction:column;gap:7px;max-height:280px;overflow:auto}
.alert-box li{
  font-size:.94rem;color:var(--text);
  padding:7px 11px;background:var(--surface2);border-radius:4px;
  border-left:3px solid var(--line);
}
.alert-box.missing li{border-left-color:var(--bad)}
.alert-box.todo li{border-left-color:var(--warn)}
.alert-box li .who{font-weight:600}
.alert-box li .units{color:var(--muted);font-size:.86rem}
.alert-empty{font-size:.94rem;color:var(--muted);font-style:italic;padding:6px 0}

/* ---------------- UPCOMING TESTS ---------------- */
.upcoming{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px}
.test-card{
  background:var(--surface);border:1px solid var(--line);border-radius:6px;
  padding:15px 16px;position:relative;
}
.test-card .tc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.test-card .tc-who{font-family:'Cinzel',serif;font-weight:600;font-size:1rem}
.test-card .tc-sub{font-size:.82rem;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.test-card .tc-unit{font-size:.92rem;color:var(--muted);margin-top:9px}
.test-card .tc-date{font-size:1.05rem;font-weight:600;margin-top:4px}
.badge{
  font-family:'Cinzel',serif;font-size:.68rem;font-weight:600;letter-spacing:.5px;
  padding:4px 9px;border-radius:20px;white-space:nowrap;
}
.badge.red{background:var(--bad-bg);color:#ef7d75;border:1px solid var(--bad)}
.badge.orange{background:var(--warn-bg);color:#eaa85c;border:1px solid var(--warn)}
.badge.green{background:var(--ok-bg);color:#5fc78a;border:1px solid var(--ok)}

/* ---------------- FILTER + TABLE ---------------- */
.filterbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filterbar button{
  font-family:'Crimson Pro',serif;font-size:.92rem;
  background:var(--surface);color:var(--muted);
  border:1px solid var(--line);border-radius:20px;padding:6px 16px;cursor:pointer;transition:.2s;
}
.filterbar button:hover{color:var(--text)}
.filterbar button.active{background:var(--accent);color:#1a1407;border-color:var(--accent);font-weight:600}
.table-shell{
  background:var(--surface);border:1px solid var(--line);border-radius:6px;
  overflow:auto;max-height:640px;
}
table{width:100%;border-collapse:collapse;font-size:.95rem}
thead th{
  position:sticky;top:0;z-index:2;
  background:var(--surface2);color:var(--accent);
  font-family:'Cinzel',serif;font-weight:600;font-size:.75rem;letter-spacing:1px;
  text-transform:uppercase;text-align:left;
  padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;
}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover td{background:color-mix(in srgb, var(--primary) 8%, transparent)}
tr.subject-row td{
  background:var(--surface2);
  font-family:'Cinzel',serif;font-weight:700;font-size:.82rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--primary-soft);padding:9px 14px;
}
.cell-name{font-weight:600;white-space:nowrap}
.cell-sub{color:var(--muted)}
.count-pill{font-family:'Cinzel',serif;font-weight:600}
/* progress dots */
.dots{display:flex;gap:4px;flex-wrap:wrap;max-width:170px}
.dot{width:13px;height:13px;border-radius:50%;cursor:default;position:relative;border:1px solid rgba(0,0,0,.3)}
.dot.ok{background:var(--ok)}
.dot.warn{background:var(--warn)}
.dot.bad{background:var(--bad)}
.dot.none{background:var(--none);opacity:.55}
.dot:hover::after{
  content:attr(data-tip);position:absolute;bottom:140%;left:50%;transform:translateX(-50%);
  background:#000;color:#fff;font-family:'Crimson Pro',serif;font-size:.78rem;
  padding:4px 9px;border-radius:4px;white-space:nowrap;z-index:5;border:1px solid var(--accent);
}
.tt-frac{font-variant-numeric:tabular-nums;color:var(--muted)}
.next-test{white-space:nowrap;font-variant-numeric:tabular-nums}
.next-none{color:var(--muted);font-style:italic}

/* ---------------- STATES + FOOTER ---------------- */
.state-card{
  background:var(--surface);border:1px solid var(--line);border-radius:8px;
  padding:46px 30px;text-align:center;margin-top:40px;
}
.state-card h2{font-family:'Cinzel',serif;color:var(--accent);font-size:1.2rem;margin-bottom:10px}
.state-card p{color:var(--muted);max-width:560px;margin:0 auto 6px;font-size:.96rem}
.state-card code{background:var(--surface2);padding:2px 7px;border-radius:4px;color:var(--text);font-size:.9rem}
.spinner{
  width:34px;height:34px;margin:0 auto 18px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--accent);animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
footer{
  margin-top:50px;padding-top:22px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  font-size:.85rem;color:var(--muted);
}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.84rem;color:var(--muted);margin-bottom:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend .dot{width:11px;height:11px}

@media (max-width:900px){
  body{font-size:16px}
  .cards{grid-template-columns:repeat(2,1fr)}
  .alerts{grid-template-columns:1fr}
  .head-meta{align-items:flex-start;text-align:left;width:100%}
  .school-name{font-size:1.55rem}
  .card .val{font-size:2.1rem}
}
</style>
</head>
<body>
<div class="app" id="app" data-school="MCA">
  <div class="wrap">

    <header class="masthead">
      <div class="head-top">
        <div class="crest" id="crest"></div>
        <div class="head-titles">
          <div class="school-name" id="schoolName">McIntosh County Academy</div>
          <div class="dash-sub">Curriculum Map Dashboard</div>
        </div>
        <div class="head-meta">
          <span class="year-pill">2025 &ndash; 2026</span>
          <span class="updated" id="updated">Not yet loaded</span>
          <button class="refresh" id="refreshBtn" title="Refreshes automatically every 15 minutes">&#8635; Refresh</button>
        </div>
      </div>
      <nav class="selector" id="selector">
        <button data-school="MCA" class="active">MCA</button>
        <button data-school="TGE">TGE</button>
        <button data-school="MCMS">MCMS</button>
      </nav>
    </header>

    <main id="content"><!-- rendered by JS --></main>

    <footer>
      <span id="footName">McIntosh County Academy</span>
      <span id="footGen"></span>
    </footer>
  </div>
</div>

/* ================================================================
   4. UTILITIES
   ================================================================ */
function $(id){ return document.getElementById(id); }
function setHTML(id, html){ var el=$(id); if(el) el.innerHTML=html; }
function setText(id, txt){ var el=$(id); if(el) el.textContent=txt; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

var MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function monthIndex(s){
  if(!s) return -1;
  var k=String(s).trim().toLowerCase().slice(0,3);
  return (k in MONTHS)?MONTHS[k]:-1;
}
/* Academic year 2025-2026: Aug-Dec -> 2025, Jan-Jul -> 2026 */
function schoolYearFor(monthIdx){ return monthIdx>=7 ? 2025 : 2026; }

/* parseDate: returns a Date, or null for blank / TBD / N/A / any ? */
function parseDate(raw){
  if(raw==null) return null;
  var s=String(raw).trim();
  if(s==="") return null;
  if(s.indexOf("?")!==-1) return null;
  var low=s.toLowerCase();
  if(low==="tbd"||low==="n/a"||low==="na") return null;

  var m=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{2,4})$/);
  if(m){
    var mo=+m[1], d=+m[2], y=+m[3];
    if(y<100) y+=2000;
    var dt=new Date(y,mo-1,d);
    return isNaN(dt.getTime())?null:dt;
  }
  var mm=s.match(/^([A-Za-z]{3,9})\.?\s*(\d{1,2})$/);
  if(mm){
    var mi=monthIndex(mm[1]);
    if(mi<0) return null;
    var dt2=new Date(schoolYearFor(mi),mi,+mm[2]);
    return isNaN(dt2.getTime())?null:dt2;
  }
  var p=Date.parse(s);
  return isNaN(p)?null:new Date(p);
}
function startOfToday(){ var t=new Date(); t.setHours(0,0,0,0); return t; }
function daysBetween(a,b){ return Math.round((a.getTime()-b.getTime())/86400000); }
function fmtShort(d){ return (d.getMonth()+1)+"/"+d.getDate(); }
function fmtLong(d){
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}

/* ================================================================
   5. PER-UNIT INTERPRETATION  (returns dot status + flags)
   status: "ok" green | "warn" orange | "bad" red | "none" gray
   ================================================================ */
function isPosted(u,kind){
  if(kind==="mca"){
    var p=(u.plan||"").trim().toLowerCase();
    return p!=="" && p!=="n/a" && p.indexOf("no longer")!==0;
  }
  if(kind==="tge"){ return (u.bwd||"")!=="" || (u.test||"")!==""; }
  return (u.plan||"")!==""; // mcms
}
function isShared(u,kind){
  if(kind==="mcms") return (u.test||"").trim()!=="";
  return (u.shared||"").trim().toLowerCase()==="shared";
}
function isNA(u,kind){
  if(kind==="mcms") return false;
  return (u.shared||"").trim().toLowerCase()==="n/a";
}
function dateTBD(u){ return (u.date||"").trim()!=="" && parseDate(u.date)===null; }

function unitStatus(u,kind){
  if(!isPosted(u,kind)) return "none";
  if(dateTBD(u)) return "bad";
  if(isShared(u,kind)) return "ok";
  return "warn";
}

/* ================================================================
   6. ROW HELPERS  (normalize the three shapes to a common view)
   ================================================================ */
function rowLabel(row,school){
  if(school==="MCA")  return { primary:row.name,  secondary:row.course };
  if(school==="TGE")  return { primary:row.grade, secondary:"" };
  // MCMS teacherGrade like "Stewart-6"
  var tg=String(row.teacherGrade||""); var dash=tg.lastIndexOf("-");
  if(dash>-1) return { primary:tg.slice(0,dash), secondary:tg.slice(dash+1) };
  return { primary:tg, secondary:"" };
}
function nextTest(row,kind){
  var t0=startOfToday(), best=null;
  for(var i=0;i<row.units.length;i++){
    var d=parseDate(row.units[i].date);
    if(d && d.getTime()>=t0.getTime() && (best===null||d<best)) best=d;
  }
  return best;
}

/* ================================================================
   7. RENDER
   ================================================================ */
function render(){
  var meta=META[current];
  $("app").setAttribute("data-school",current);
  setText("schoolName",meta.name);
  setText("footName",meta.name);
  setText("footGen","Generated "+fmtLong(new Date()));

  // crest / logo
  var crest=$("crest");
  if(crest){
    var logo=meta.logo();
    crest.innerHTML = (logo && logo.indexOf("data:")===0)
      ? '<img src="'+logo+'" alt="'+esc(meta.name)+' logo">'
      : '<span class="mono">'+esc(meta.mono)+'</span>';
  }

  // selector active state
  var btns=document.querySelectorAll("#selector button");
  for(var i=0;i<btns.length;i++){
    btns[i].classList.toggle("active", btns[i].getAttribute("data-school")===current);
  }

  if(SCRIPT_URL==="PASTE_YOUR_EXEC_URL_HERE" || SCRIPT_URL===""){
    setHTML("content",
      '<div class="state-card"><h2>Backend not connected</h2>'+
      '<p>Deploy <code>CurriculumDashboard_Backend.gs</code> as a Web App, then paste the <code>/exec</code> URL into the <code>SCRIPT_URL</code> value at the top of this file.</p>'+
      '<p>Once connected, this dashboard reads live from your sheet on every load.</p></div>');
    return;
  }
  if(DATA===null){
    setHTML("content",'<div class="state-card"><div class="spinner"></div><h2>Loading curriculum data</h2><p>Reading the sheet.</p></div>');
    return;
  }
  if(DATA.__error){
    setHTML("content",
      '<div class="state-card"><h2>Could not load data</h2><p>'+esc(DATA.__error)+'</p>'+
      '<p>If this is a cross-origin block, route the fetch through your Cloudflare Worker proxy.</p></div>');
    return;
  }

  var rows=DATA[current]||[];
  var html="";
  html+=renderCards(rows,meta);
  html+=renderAlerts(rows,meta);
  html+=renderUpcoming(rows);
  html+=renderTable(rows,meta);
  setHTML("content",html);
  wireFilter();
  if(activeFilter!=="All") filterTable();
}

/* ----- summary cards ----- */
function renderCards(rows,meta){
  var kind=meta.kind, t0=startOfToday(), wk=new Date(t0.getTime()+7*86400000);
  var posted=0,shared=0,notShared=0,talks=0,thisWeek=0;
  rows.forEach(function(r){
    r.units.forEach(function(u){
      var st=unitStatus(u,kind);
      if(st!=="none") posted++;
      if(st==="ok") shared++;
      if(st==="warn" && !isNA(u,kind)) notShared++;
      if(meta.testTalk && u.testTalk===true) talks++;
      var d=parseDate(u.date);
      if(d && d.getTime()>=t0.getTime() && d.getTime()<=wk.getTime()) thisWeek++;
    });
  });
  var rowWord = (current==="TGE") ? "Total Grades" : "Total Teachers";
  var c=[];
  c.push(card(rows.length,rowWord));
  c.push(card(posted,"Units Posted"));
  c.push(card(shared,"Assessments Shared",true));
  if(kind!=="mcms") c.push(card(notShared,"Not Shared"));
  if(meta.testTalk) c.push(card(talks,"Test Talks Done"));
  c.push(card(thisWeek,"Tests This Week"));
  return '<section class="section"><div class="cards">'+c.join("")+'</div></section>';
}
function card(val,label,accent){
  return '<div class="card'+(accent?' accent':'')+'"><div class="val">'+val+'</div><div class="lbl">'+esc(label)+'</div></div>';
}

/* ----- alerts ----- */
function renderAlerts(rows,meta){
  var kind=meta.kind;
  // Box 1: missing assessments (posted, not shared, not N/A)
  var missing=[];
  rows.forEach(function(r){
    var lbl=rowLabel(r,current), us=[];
    r.units.forEach(function(u,idx){
      if(isPosted(u,kind) && !isShared(u,kind) && !isNA(u,kind)) us.push(idx+1);
    });
    if(us.length) missing.push({who:lbl.primary+(lbl.secondary?" ("+lbl.secondary+")":""), units:us});
  });

  // Box 2: MCA/TGE = Test Talk not done (shared but no test talk)
  //        MCMS    = units with no plan posted (has date/test but blank plan)
  var box2title, box2=[];
  if(kind==="mcms"){
    box2title="Units With No Plan Posted";
    rows.forEach(function(r){
      var lbl=rowLabel(r,current), us=[];
      r.units.forEach(function(u,idx){
        var hasSomething=(u.date||"")!=="" || (u.test||"")!=="";
        if(hasSomething && (u.plan||"")==="") us.push(idx+1);
      });
      if(us.length) box2.push({who:lbl.primary+(lbl.secondary?"-"+lbl.secondary:""), units:us});
    });
  } else {
    box2title="Test Talk Not Yet Completed";
    rows.forEach(function(r){
      var lbl=rowLabel(r,current), us=[];
      r.units.forEach(function(u,idx){
        if(isShared(u,kind) && u.testTalk!==true) us.push(idx+1);
      });
      if(us.length) box2.push({who:lbl.primary+(lbl.secondary?" ("+lbl.secondary+")":""), units:us});
    });
  }

  return '<section class="section"><div class="section-title">Action Items</div>'+
    '<div class="alerts">'+
      alertBox("missing","Missing Assessments",missing)+
      alertBox("todo",box2title,box2)+
    '</div></section>';
}
function alertBox(cls,title,items){
  var body;
  if(!items.length){ body='<p class="alert-empty">Nothing flagged. All clear.</p>'; }
  else{
    body='<ul>'+items.map(function(it){
      return '<li><span class="who">'+esc(it.who)+'</span> '+
             '<span class="units">Unit'+(it.units.length>1?"s":"")+' '+it.units.join(", ")+'</span></li>';
    }).join("")+'</ul>';
  }
  return '<div class="alert-box '+cls+'"><h3>'+esc(title)+'</h3>'+body+'</div>';
}

/* ----- upcoming tests (next 30 days) ----- */
function renderUpcoming(rows){
  var t0=startOfToday(), horizon=new Date(t0.getTime()+30*86400000), items=[];
  rows.forEach(function(r){
    var lbl=rowLabel(r,current);
    r.units.forEach(function(u,idx){
      var d=parseDate(u.date);
      if(d && d.getTime()>=t0.getTime() && d.getTime()<=horizon.getTime()){
        items.push({who:lbl.primary, sub:r.subject, unit:idx+1, date:d, days:daysBetween(d,t0)});
      }
    });
  });
  items.sort(function(a,b){ return a.date-b.date; });
  var body;
  if(!items.length){
    body='<div class="state-card" style="margin-top:0;padding:30px"><p>No tests scheduled in the next 30 days.</p></div>';
  } else {
    body='<div class="upcoming">'+items.map(function(it){
      var cls=it.days<=3?"red":(it.days<=7?"orange":"green");
      var txt=it.days===0?"Today":(it.days===1?"1 day":it.days+" days");
      return '<div class="test-card"><div class="tc-top">'+
        '<div><div class="tc-who">'+esc(it.who)+'</div><div class="tc-sub">'+esc(it.sub)+'</div></div>'+
        '<span class="badge '+cls+'">'+txt+'</span></div>'+
        '<div class="tc-unit">Unit '+it.unit+'</div>'+
        '<div class="tc-date">'+fmtLong(it.date)+'</div></div>';
    }).join("")+'</div>';
  }
  return '<section class="section"><div class="section-title">Upcoming Tests &middot; Next 30 Days</div>'+body+'</section>';
}

/* ----- filter bar + table ----- */
function renderTable(rows,meta){
  var kind=meta.kind;
  var subjects=[]; rows.forEach(function(r){ if(subjects.indexOf(r.subject)<0) subjects.push(r.subject); });

  var filters='<div class="filterbar" id="filterbar"><button data-f="All" class="'+
    (activeFilter==="All"?"active":"")+'">All</button>'+
    subjects.map(function(s){ return '<button data-f="'+esc(s)+'" class="'+
      (activeFilter===s?"active":"")+'">'+esc(s)+'</button>'; }).join("")+'</div>';

  // headers per school
  var heads;
  if(kind==="mca")  heads=["Teacher","Course","Units Posted","Unit Progress","Shared","Test Talks","Next Test"];
  else if(kind==="tge") heads=["Grade","Subject","Units Posted","Unit Progress","Shared","Test Talks","Next Test"];
  else heads=["Teacher","Grade","Subject","Units Posted","Unit Progress","Shared","Next Test"];
  var thead='<tr>'+heads.map(function(h){return '<th>'+h+'</th>';}).join("")+'</tr>';

  var colspan=heads.length;
  var body="", lastSub=null;
  rows.forEach(function(r){
    if(r.subject!==lastSub){
      body+='<tr class="subject-row" data-subject-header="'+esc(r.subject)+'"><td colspan="'+colspan+'">'+esc(r.subject)+'</td></tr>';
      lastSub=r.subject;
    }
    body+=renderRow(r,meta,colspan);
  });

  var legend='<div class="legend">'+
    '<span><i class="dot ok"></i>Plan + shared</span>'+
    '<span><i class="dot warn"></i>Plan + not shared</span>'+
    '<span><i class="dot bad"></i>Date TBD</span>'+
    '<span><i class="dot none"></i>No plan</span></div>';

  return '<section class="section"><div class="section-title">Teacher Detail</div>'+
    filters+legend+
    '<div class="table-shell"><table><thead>'+thead+'</thead><tbody>'+body+'</tbody></table></div></section>';
}

function renderRow(r,meta,colspan){
  var kind=meta.kind, lbl=rowLabel(r,current);
  var posted=0,shared=0,talksDone=0,talksTotal=0;
  var dots=r.units.map(function(u,idx){
    var st=unitStatus(u,kind);
    if(st!=="none"){ posted++; }
    if(st==="ok") shared++;
    if(meta.testTalk && isShared(u,kind)){ talksTotal++; if(u.testTalk===true) talksDone++; }
    var label=({ok:"shared",warn:"not shared",bad:"date TBD",none:"no plan"})[st];
    return '<span class="dot '+st+'" data-tip="Unit '+(idx+1)+': '+label+'"></span>';
  }).join("");

  var nt=nextTest(r,kind);
  var ntCell = nt ? '<span class="next-test">'+fmtShort(nt)+'</span>' : '<span class="next-none">None</span>';
  var dotsCell='<div class="dots">'+dots+'</div>';

  var cells=[];
  if(kind==="mca"){
    cells=['<span class="cell-name">'+esc(lbl.primary)+'</span>','<span class="cell-sub">'+esc(lbl.secondary)+'</span>',
      '<span class="count-pill">'+posted+'</span>',dotsCell,'<span class="count-pill">'+shared+'</span>',
      '<span class="tt-frac">'+talksDone+' / '+talksTotal+'</span>',ntCell];
  } else if(kind==="tge"){
    cells=['<span class="cell-name">'+esc(lbl.primary)+'</span>','<span class="cell-sub">'+esc(r.subject)+'</span>',
      '<span class="count-pill">'+posted+'</span>',dotsCell,'<span class="count-pill">'+shared+'</span>',
      '<span class="tt-frac">'+talksDone+' / '+talksTotal+'</span>',ntCell];
  } else {
    cells=['<span class="cell-name">'+esc(lbl.primary)+'</span>','<span class="cell-sub">'+esc(lbl.secondary)+'</span>',
      '<span class="cell-sub">'+esc(r.subject)+'</span>','<span class="count-pill">'+posted+'</span>',
      dotsCell,'<span class="count-pill">'+shared+'</span>',ntCell];
  }
  return '<tr data-subject="'+esc(r.subject)+'">'+cells.map(function(c){return '<td>'+c+'</td>';}).join("")+'</tr>';
}

/* filterTable: show only the chosen subject; hide subject header
   rows whose data rows are all filtered out. */
function filterTable(){
  var dataRows=document.querySelectorAll('tr[data-subject]');
  for(var i=0;i<dataRows.length;i++){
    var s=dataRows[i].getAttribute("data-subject");
    dataRows[i].style.display=(activeFilter==="All"||activeFilter===s)?"":"none";
  }
  var headers=document.querySelectorAll('tr[data-subject-header]');
  for(var j=0;j<headers.length;j++){
    var hs=headers[j].getAttribute("data-subject-header");
    headers[j].style.display=(activeFilter==="All"||activeFilter===hs)?"":"none";
  }
}
function wireFilter(){
  var bar=$("filterbar"); if(!bar) return;
  var btns=bar.querySelectorAll("button");
  for(var i=0;i<btns.length;i++){
    btns[i].addEventListener("click",function(){
      activeFilter=this.getAttribute("data-f");
      for(var k=0;k<btns.length;k++) btns[k].classList.remove("active");
      this.classList.add("active");
      filterTable();
    });
  }
}

/* ================================================================
   8. DATA LOADING
   ================================================================ */
/* load(silent): silent=true is the background 15-minute refresh.
   It does not blank the screen with a spinner, and a failed
   background pull keeps the last good data on screen. */
function load(silent){
  if(SCRIPT_URL==="PASTE_YOUR_EXEC_URL_HERE" || SCRIPT_URL===""){ render(); return; }
  if(!silent){ DATA=null; render(); }
  var url=SCRIPT_URL+(SCRIPT_URL.indexOf("?")>-1?"&":"?")+"t="+Date.now();
  fetch(url,{method:"GET"})
    .then(function(res){ if(!res.ok) throw new Error("HTTP "+res.status); return res.json(); })
    .then(function(json){
      if(json.status!=="success") throw new Error(json.message||"Backend returned an error");
      DATA=json.schools||{MCA:[],TGE:[],MCMS:[]};
      var when=json.updatedAt?new Date(json.updatedAt):new Date();
      setText("updated","Updated "+when.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}));
      render();
    })
    .catch(function(err){
      if(silent) return;            // keep last good data on a background blip
      DATA={__error:String(err.message||err)}; render();
    });
}

/* ================================================================
   9. EVENTS + BOOT
   ================================================================ */
(function init(){
  var sel=$("selector");
  if(sel){
    sel.addEventListener("click",function(e){
      var b=e.target.closest("button"); if(!b) return;
      var s=b.getAttribute("data-school"); if(!s||s===current) return;
      current=s; activeFilter="All"; render();
    });
  }
  var rb=$("refreshBtn");
  if(rb) rb.addEventListener("click",function(){ load(false); });
  load(false);
  // Auto-refresh every 15 minutes (silent: no spinner, keeps view)
  setInterval(function(){ load(true); }, 15*60*1000);
})();
</script>
