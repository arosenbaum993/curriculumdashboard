<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Planning Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ================================================================
   McIntosh County Schools - Unit Planning Dashboard
   Style matched to the superintendent's mockup: near-black,
   deep red primary, antique gold headers, green status pills.
   ================================================================ */
:root{
  --bg:#0d0a08; --surface:#171110; --surface2:#221913; --line:#3a2c22;
  --primary:#a01f1f; --primary-soft:#c64242;
  --gold:#d2a94e; --gold-soft:#e6c887;
  --text:#f4ecdc; --muted:#b5a68f;
  --ok:#3aa564; --warn:#d68a35; --bad:#c0413a; --info:#5b9bd5; --none:#5f5a52;
  --ok-bg:rgba(58,165,100,.14); --warn-bg:rgba(214,138,53,.14);
  --bad-bg:rgba(192,65,58,.14); --info-bg:rgba(91,155,213,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:'Crimson Pro',Georgia,serif; font-size:17px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 12% 0%, rgba(160,31,31,.20), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(210,169,78,.08), transparent 35%);
  min-height:100vh;
}
.wrap{max-width:1280px;margin:0 auto;padding:0 26px 70px}

/* ---------- header ---------- */
header.masthead{padding:28px 0 0;border-bottom:1px solid var(--line);margin-bottom:24px}
.head-top{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.crest{
  width:70px;height:70px;flex:0 0 auto;border-radius:50%;
  background:var(--surface2);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 6px 22px rgba(0,0,0,.45);
  font-family:'Cinzel',serif;font-weight:900;font-size:1.6rem;color:var(--gold);
}
.crest img{width:100%;height:100%;object-fit:cover}
.head-titles{flex:1 1 320px;min-width:240px}
.school-name{font-family:'Cinzel',serif;font-weight:700;font-size:1.85rem;line-height:1.1;letter-spacing:.5px}
.dash-sub{font-family:'Cinzel',serif;letter-spacing:3px;text-transform:uppercase;font-size:.72rem;color:var(--gold);margin-top:6px}
.head-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px;text-align:right}
.year-pill{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:1.5px;border:1px solid var(--gold);color:var(--gold);padding:5px 12px;border-radius:2px}
.updated{font-size:.85rem;color:var(--muted)}
.refresh{
  background:transparent;border:1px solid var(--line);color:var(--muted);
  font-family:'Crimson Pro',serif;font-size:.86rem;cursor:pointer;
  padding:5px 12px;border-radius:4px;transition:.2s;
}
.refresh:hover{border-color:var(--gold);color:var(--gold)}

/* school selector */
.selector{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.selector button{
  font-family:'Cinzel',serif;font-weight:600;font-size:.8rem;letter-spacing:2px;
  background:var(--surface);color:var(--muted);border:1px solid var(--line);
  border-radius:4px;padding:9px 20px;cursor:pointer;transition:.22s;
}
.selector button:hover{color:var(--text);border-color:var(--primary-soft)}
.selector button.active{background:var(--gold);color:#1a1206;border-color:var(--gold)}

/* view tabs */
.viewtabs{display:flex;gap:8px;margin:16px 0 0;flex-wrap:wrap;padding-bottom:16px}
.viewtabs button{
  font-family:'Cinzel',serif;font-weight:600;font-size:.78rem;letter-spacing:1.5px;
  background:var(--surface);color:var(--muted);border:1px solid var(--line);
  border-radius:4px;padding:9px 18px;cursor:pointer;transition:.22s;text-transform:uppercase;
}
.viewtabs button:hover{color:var(--text)}
.viewtabs button.active{
  background:var(--primary);color:#fff;border-color:var(--primary);
  box-shadow:0 4px 16px rgba(160,31,31,.45);
}

/* ---------- shells ---------- */
.section{margin-top:30px}
.section-title{
  font-family:'Cinzel',serif;font-weight:600;font-size:1rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.section-title::after{content:"";flex:1;height:1px;background:var(--line)}

.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:18px 16px}
.card .val{font-family:'Cinzel',serif;font-weight:700;font-size:2.2rem;line-height:1}
.card .val.ok{color:var(--ok)} .card .val.warn{color:var(--warn)}
.card .val.bad{color:var(--bad)} .card .val.info{color:var(--info)} .card .val.gold{color:var(--gold)}
.card .lbl{font-size:.8rem;color:var(--muted);margin-top:8px;letter-spacing:.4px;text-transform:uppercase}
.card .sub{font-size:.82rem;color:var(--muted);margin-top:2px}

.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:18px 20px}
.panel h3{
  font-family:'Cinzel',serif;font-weight:600;font-size:.9rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--gold);margin-bottom:12px;
}
.deadline-list{list-style:none;display:flex;flex-direction:column;gap:8px;max-height:420px;overflow:auto}
.deadline-list li{
  display:flex;justify-content:space-between;gap:10px;align-items:center;
  background:var(--surface2);border-radius:4px;padding:8px 12px;
  border-left:3px solid var(--gold);font-size:.93rem;
}
.deadline-list li.overdue{border-left-color:var(--bad)}
.deadline-list li .who{font-weight:600}
.deadline-list li .what{color:var(--muted);font-size:.85rem}
.deadline-list li .when{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);white-space:nowrap}
.deadline-list li.overdue .when{color:var(--bad)}
.empty-note{color:var(--muted);font-style:italic;font-size:.93rem;padding:4px 0}

/* banner */
.banner{
  margin-top:26px;background:var(--surface);border:1px solid var(--line);
  border-left:4px solid var(--primary);border-radius:6px;padding:14px 20px;
  font-size:.98rem;color:var(--text);
}
.banner b{color:var(--gold-soft)}

/* ---------- tables ---------- */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.toolbar button{
  font-family:'Crimson Pro',serif;font-size:.9rem;background:var(--surface);
  color:var(--muted);border:1px solid var(--line);border-radius:20px;
  padding:5px 15px;cursor:pointer;transition:.2s;
}
.toolbar button:hover{color:var(--text)}
.toolbar button.active{background:var(--gold);color:#1a1206;border-color:var(--gold);font-weight:600}
.toolbar input{
  margin-left:auto;background:var(--surface);border:1px solid var(--line);border-radius:20px;
  color:var(--text);font-family:'Crimson Pro',serif;font-size:.9rem;padding:6px 14px;min-width:190px;outline:none;
}
.toolbar input:focus{border-color:var(--gold)}
.table-shell{background:var(--surface);border:1px solid var(--line);border-radius:6px;overflow:auto;max-height:660px}
table{width:100%;border-collapse:collapse;font-size:.94rem}
thead th{
  position:sticky;top:0;z-index:2;background:var(--surface2);color:var(--gold);
  font-family:'Cinzel',serif;font-weight:600;font-size:.72rem;letter-spacing:1px;
  text-transform:uppercase;text-align:left;padding:11px 14px;
  border-bottom:1px solid var(--line);white-space:nowrap;
}
tbody td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover td{background:rgba(160,31,31,.08)}
tr.subject-row td{
  background:var(--surface2);font-family:'Cinzel',serif;font-weight:700;font-size:.78rem;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--primary-soft);padding:8px 14px;
}
.cell-name{font-weight:600;white-space:nowrap}
.cell-sub{color:var(--muted)}
.num{font-variant-numeric:tabular-nums;white-space:nowrap}
.mark-ok{color:var(--ok);font-weight:700}
.mark-bad{color:var(--bad);font-weight:700}
.mark-none{color:var(--none)}

.pill{
  font-family:'Cinzel',serif;font-size:.66rem;font-weight:600;letter-spacing:.5px;
  padding:4px 10px;border-radius:20px;white-space:nowrap;display:inline-block;
}
.pill.ok{background:var(--ok-bg);color:#5fc78a;border:1px solid var(--ok)}
.pill.warn{background:var(--warn-bg);color:#eaa85c;border:1px solid var(--warn)}
.pill.bad{background:var(--bad-bg);color:#ef7d75;border:1px solid var(--bad)}
.pill.info{background:var(--info-bg);color:#8fbfe8;border:1px solid var(--info)}
.pill.none{background:transparent;color:var(--muted);border:1px solid var(--line)}

/* progress bar */
.bar{background:var(--surface2);border-radius:4px;height:12px;min-width:120px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--ok);border-radius:4px}
.bar i.warn{background:var(--warn)} .bar i.bad{background:var(--bad)}

/* states */
.state-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:46px 30px;text-align:center;margin-top:40px}
.state-card h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2rem;margin-bottom:10px}
.state-card p{color:var(--muted);max-width:620px;margin:0 auto 6px;font-size:.96rem}
.state-card button{
  margin-top:14px;background:var(--primary);border:none;color:#fff;
  font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:1.5px;
  padding:10px 22px;border-radius:4px;cursor:pointer;
}
.spinner{width:34px;height:34px;margin:0 auto 18px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--gold);animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

footer{
  margin-top:50px;padding-top:22px;border-top:1px solid var(--line);
  font-size:.88rem;color:var(--muted);text-align:center;line-height:1.7;
}
footer .creed{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}

@media (max-width:960px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .head-meta{align-items:flex-start;text-align:left;width:100%}
  .school-name{font-size:1.5rem}
  .toolbar input{margin-left:0;width:100%}
}
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="head-top">
      <div class="crest" id="crest">M</div>
      <div class="head-titles">
        <div class="school-name" id="schoolName">McIntosh County Schools</div>
        <div class="dash-sub">Unit Planning Dashboard</div>
      </div>
      <div class="head-meta">
        <span class="year-pill">2026 &ndash; 2027</span>
        <span class="updated" id="updated">Not yet loaded</span>
        <button class="refresh" id="refreshBtn" title="Refreshes automatically every 15 minutes">&#8635; Refresh</button>
      </div>
    </div>
    <nav class="selector" id="selector">
      <button data-school="DISTRICT" class="active">District</button>
      <button data-school="TGE">TGE</button>
      <button data-school="MCMS">MCMS</button>
      <button data-school="MCA">MCA</button>
    </nav>
    <nav class="viewtabs" id="viewtabs">
      <button data-view="overview" class="active">Overview</button>
      <button data-view="teachers">Teachers</button>
      <button data-view="units">Units</button>
      <button data-view="assessments">Assessments</button>
      <button data-view="testtalk">Test Talk</button>
    </nav>
  </header>

  <main id="content"></main>

  <footer>
    <div class="creed">The district owns the system &middot; Principals own implementation &middot; Teachers own instruction &middot; Students own learning</div>
    <div id="footGen"></div>
  </footer>
</div>

<script>
"use strict";

/* ================================================================
   1. CONFIG - same Apps Script /exec URL as the Curriculum Map
      Dashboard. One source of truth.
   ================================================================ */
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzt_El1qJUafcLvVKOE-DzPd16qzJvrSoYskvlN_qp_wnhSIGbYD05WsMFMoSSh65fI1g/exec";
var ACADEMIC_YEAR_START = 2026;   /* 2026 renders "2026-2027"; Aug-Dec -> 2026, Jan-Jul -> 2027 */
var DUE_SOON_DAYS = 14;           /* window for "due soon" flags and the deadline panel */

var SCHOOL_NAMES = {
  DISTRICT: "McIntosh County Schools",
  TGE:  "Todd Grant Elementary",
  MCMS: "McIntosh County Middle School",
  MCA:  "McIntosh County Academy"
};

/* ================================================================
   2. FIELD MAPPING (confirmed with the curriculum director)
      Every unit is reduced to: plan submitted? assessment
      submitted? test date, test talk done (if tracked).
        MCA  : plan = plan,   assessment = shared, testTalk tracked
        TGE  : plan = shared, assessment = test,   testTalk tracked
        MCMS : plan = plan,   assessment = test,   testTalk not in sheet yet
   ================================================================ */

/* ---------------- state ---------------- */
var RAW = null;          /* payload.schools */
var ROWS = [];           /* normalized rows */
var state = { school:"DISTRICT", view:"overview", filter:"all", search:"" };

/* ---------------- school logos ----------------
   The logos already live as base64 data URIs inside index.html
   (the Curriculum Map Dashboard) in this same folder. Instead of
   duplicating ~100KB of image data here, we fetch that file once
   and lift the LOGO_MCA / LOGO_TGE / LOGO_MCMS variables out of
   it. If the fetch fails (e.g., previewing this file locally
   from your desktop), the gold monogram shows instead.          */
var LOGOS = {};
function loadLogos(){
  fetch("index.html").then(function(r){ return r.text(); }).then(function(txt){
    ["MCA","TGE","MCMS"].forEach(function(k){
      var m = txt.match(new RegExp('var\\s+LOGO_' + k + '\\s*=\\s*"(data:image[^"]+)"'));
      if(m) LOGOS[k] = m[1];
    });
    drawCrest();
  }).catch(function(){ /* monogram fallback */ });
}
function drawCrest(){
  var c = document.getElementById("crest");
  if(!c) return;
  var logo = LOGOS[state.school];
  if(logo) c.innerHTML = '<img src="' + logo + '" alt="' + state.school + ' logo">';
  else c.textContent = "M";
}

/* ---------------- fetch ---------------- */
function load(){
  render(loadingCard());
  fetch(SCRIPT_URL).then(function(r){ return r.json(); }).then(function(p){
    if(!p || p.status !== "success" || !p.schools) throw new Error(p && p.message ? p.message : "Bad payload");
    RAW = p.schools;
    ROWS = normalize(RAW);
    document.getElementById("updated").textContent = "Updated " + fmtStamp(new Date());
    document.getElementById("footGen").textContent = "Data source: district curriculum map workbook (live).";
    draw();
  }).catch(function(err){
    render(errorCard(String(err)));
  });
}

/* ---------------- normalize ---------------- */
function filled(v){
  if(v === null || v === undefined) return false;
  var s = String(v).trim().toLowerCase();
  if(s === "" || s === "false" || s === "no" || s === "n" || s === "0" || s === "-" || s === "n/a" || s === "na") return false;
  return true;
}
var MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11};
function parseDate(s){
  if(!s) return null;
  s = String(s).trim();
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){
    var y = +m[3]; if(y < 100) y += 2000;
    var d = new Date(y, +m[1]-1, +m[2]);
    return isNaN(d) ? null : d;
  }
  m = s.match(/^(\d{1,2})\/(\d{1,2})$/);  /* M/D with no year */
  if(m){
    var mo = +m[1]-1;
    return new Date(mo >= 7 ? ACADEMIC_YEAR_START : ACADEMIC_YEAR_START+1, mo, +m[2]);
  }
  var key = s.slice(0,4).toLowerCase().replace(/[^a-z]/g,"").slice(0,4);
  for(var k in MONTHS){
    if(key.indexOf(k) === 0){
      var mo2 = MONTHS[k];
      return new Date(mo2 >= 7 ? ACADEMIC_YEAR_START : ACADEMIC_YEAR_START+1, mo2, 15);
    }
  }
  var d2 = new Date(s);
  return isNaN(d2) ? null : d2;
}
function mkUnit(n, plan, assess, dateStr, tt){
  var date = parseDate(dateStr);
  var p = filled(plan), a = filled(assess);
  return {
    n:n, plan:p, assess:a, date:date, dateStr:dateStr || "",
    tt:(tt === true || tt === false) ? tt : null,
    active:(p || a || !!date)
  };
}
function normalize(schools){
  var rows = [];
  (schools.MCA || []).forEach(function(t){
    rows.push({
      school:"MCA", subject:t.subject || "", label:t.name || "",
      sub:t.course || "",
      units:(t.units || []).map(function(u,i){ return mkUnit(i+1, u.plan, u.shared, u.date, u.testTalk); })
    });
  });
  (schools.TGE || []).forEach(function(t){
    rows.push({
      school:"TGE", subject:t.subject || "", label:t.grade || "", sub:"",
      units:(t.units || []).map(function(u,i){ return mkUnit(i+1, u.shared, u.test, u.date, u.testTalk); })
    });
  });
  (schools.MCMS || []).forEach(function(t){
    rows.push({
      school:"MCMS", subject:t.subject || "", label:t.teacherGrade || "", sub:"",
      units:(t.units || []).map(function(u,i){ return mkUnit(i+1, u.plan, u.test, u.date, null); })
    });
  });
  return rows;
}

/* ---------------- status logic ----------------
   Core rule from the framework: a unit requires BOTH the unit
   plan and the unit assessment before instruction begins. A
   plan without an assessment is an incomplete submission.     */
function today(){ var d = new Date(); d.setHours(0,0,0,0); return d; }
function daysUntil(date){ return Math.round((date - today()) / 86400000); }

function unitStatus(u){
  if(!u.active) return null;
  var complete = u.plan && u.assess;
  var need = !u.plan && !u.assess ? "Needs Plan + Assessment"
           : !u.assess            ? "Needs Assessment"
           : !u.plan              ? "Needs Plan" : "Ready";
  var urgency = "future";
  if(u.date){
    var d = daysUntil(u.date);
    urgency = d < 0 ? "past" : (d <= DUE_SOON_DAYS ? "soon" : "future");
  }
  var cls = complete ? "ok"
          : urgency === "past" ? "bad"
          : urgency === "soon" ? "warn" : "none";
  return { complete:complete, label:need, cls:cls, urgency:urgency };
}
function rowAgg(row){
  var act = row.units.filter(function(u){ return u.active; });
  var plans = act.filter(function(u){ return u.plan; }).length;
  var assess = act.filter(function(u){ return u.assess; }).length;
  var ttDue = act.filter(function(u){ return u.tt !== null && u.date && daysUntil(u.date) < 0; });
  var ttDone = ttDue.filter(function(u){ return u.tt === true; }).length;
  var worst = "ok";
  act.forEach(function(u){
    var s = unitStatus(u);
    if(s && !s.complete){
      if(s.urgency === "past") worst = "bad";
      else if(s.urgency === "soon" && worst !== "bad") worst = "warn";
    }
  });
  if(worst === "ok" && ttDue.length > ttDone) worst = "warn";
  var next = null;
  act.forEach(function(u){
    if(u.date && daysUntil(u.date) >= 0 && (!next || u.date < next)) next = u.date;
  });
  return { active:act.length, plans:plans, assess:assess,
           ttTracked:act.some(function(u){ return u.tt !== null; }),
           ttDue:ttDue.length, ttDone:ttDone, worst:worst, next:next };
}
function scopeRows(){
  return ROWS.filter(function(r){ return state.school === "DISTRICT" || r.school === state.school; });
}

/* ---------------- formatting helpers ---------------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(d){ return d ? (d.getMonth()+1) + "/" + d.getDate() + "/" + d.getFullYear() : ""; }
function fmtStamp(d){
  var h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return (d.getMonth()+1) + "/" + d.getDate() + "/" + d.getFullYear() + " " + h + ":" + (m<10?"0":"") + m + " " + ap;
}
function pct(a,b){ return b ? Math.round(100*a/b) : 0; }
function mark(v){ return v ? '<span class="mark-ok">&#10003;</span>' : '<span class="mark-bad">&#9888;</span>'; }
function pill(cls, text){ return '<span class="pill ' + cls + '">' + esc(text) + '</span>'; }
function statusPill(worst){
  return worst === "ok" ? pill("ok","On Track")
       : worst === "warn" ? pill("warn","Needs Attention")
       : pill("bad","Behind");
}
function render(html){ document.getElementById("content").innerHTML = html; }

/* ---------------- views ---------------- */
function draw(){
  document.getElementById("schoolName").textContent = SCHOOL_NAMES[state.school];
  drawCrest();
  if(!RAW){ return; }
  var v = state.view;
  if(v === "overview") render(viewOverview());
  else if(v === "teachers") render(viewTeachers());
  else if(v === "units") render(viewUnits());
  else if(v === "assessments") render(viewAssessments());
  else render(viewTestTalk());
  bindToolbar();
}

function collectUnits(rows){
  var out = [];
  rows.forEach(function(r){
    r.units.forEach(function(u){
      if(u.active) out.push({ row:r, u:u, s:unitStatus(u) });
    });
  });
  return out;
}

function viewOverview(){
  var rows = scopeRows();
  var units = collectUnits(rows);
  var plans = units.filter(function(x){ return x.u.plan; }).length;
  var assess = units.filter(function(x){ return x.u.assess; }).length;
  var ttDue = units.filter(function(x){ return x.u.tt !== null && x.u.date && daysUntil(x.u.date) < 0; });
  var ttDone = ttDue.filter(function(x){ return x.u.tt === true; }).length;
  var flagged = units.filter(function(x){ return !x.s.complete && (x.s.urgency === "past" || x.s.urgency === "soon"); });
  var upcoming = units.filter(function(x){
    return x.u.date && daysUntil(x.u.date) >= 0 && daysUntil(x.u.date) <= DUE_SOON_DAYS;
  }).sort(function(a,b){ return a.u.date - b.u.date; });

  var pPct = pct(plans, units.length), aPct = pct(assess, units.length);
  var html = '<div class="section"><div class="section-title">At a Glance</div><div class="cards">'
    + kpi(pPct + "%", pPct === 100 ? "ok" : pPct >= 85 ? "warn" : "bad", "Unit plans submitted", plans + " of " + units.length + " units")
    + kpi(aPct + "%", aPct === 100 ? "ok" : aPct >= 85 ? "warn" : "bad", "Assessments submitted", assess + " of " + units.length + " units")
    + kpi(ttDue.length ? pct(ttDone, ttDue.length) + "%" : "&mdash;", ttDue.length && ttDone === ttDue.length ? "ok" : ttDue.length ? "warn" : "gold", "Test talk completed", ttDue.length ? ttDone + " of " + ttDue.length + " administered units" : "No units administered yet")
    + kpi(String(flagged.length), flagged.length ? "bad" : "ok", "Units flagged", "Missing items, due or past due")
    + kpi(String(upcoming.length), "info", "Deadlines next " + DUE_SOON_DAYS + " days", "Unit test dates")
    + '</div></div>';

  /* deadlines + submission status */
  html += '<div class="section"><div class="grid2">';
  html += '<div class="panel"><h3>Submission Status Overview</h3><div class="table-shell" style="max-height:none;border:none"><table><thead><tr><th>Submission Type</th><th>Required</th><th>Completed</th><th style="width:180px">Percent</th><th>Status</th></tr></thead><tbody>'
    + subRow("Unit Plans", units.length, plans)
    + subRow("Unit Assessments", units.length, assess)
    + subRow("Test Talk (administered units)", ttDue.length, ttDone)
    + '</tbody></table></div></div>';
  html += '<div class="panel"><h3>Upcoming Deadlines (Next ' + DUE_SOON_DAYS + ' Days)</h3>';
  if(!upcoming.length) html += '<div class="empty-note">No unit test dates in the next ' + DUE_SOON_DAYS + ' days.</div>';
  else{
    html += '<ul class="deadline-list">';
    upcoming.slice(0, 12).forEach(function(x){
      html += '<li><span><span class="who">' + esc(x.row.label) + '</span> <span class="what">' + esc(schoolTag(x.row)) + 'Unit ' + x.u.n + (x.s.complete ? '' : ' &middot; ' + esc(x.s.label)) + '</span></span><span class="when">' + fmtDate(x.u.date) + '</span></li>';
    });
    html += '</ul>';
  }
  html += '</div></div></div>';

  /* teacher summary */
  html += '<div class="section"><div class="section-title">Teacher Progress Summary</div>' + teacherTable(rows, true) + '</div>';

  html += '<div class="banner"><b>Monitoring principle:</b> every unit requires <b>both</b> a unit plan and a unit assessment before instruction begins. A plan without an assessment is an incomplete submission. This dashboard is not a compliance trap; it is an early-warning system, and it should never surprise a principal.</div>';
  return html;
}
function kpi(val, cls, lbl, sub){
  return '<div class="card"><div class="val ' + cls + '">' + val + '</div><div class="lbl">' + esc(lbl) + '</div><div class="sub">' + esc(sub) + '</div></div>';
}
function subRow(name, req, done){
  var p = pct(done, req);
  var cls = req === 0 ? "ok" : p === 100 ? "" : p >= 85 ? "warn" : "bad";
  return '<tr><td class="cell-name">' + esc(name) + '</td><td class="num">' + req + '</td><td class="num">' + done + '</td>'
    + '<td><div class="bar"><i class="' + cls + '" style="width:' + (req ? p : 100) + '%"></i></div></td>'
    + '<td>' + (req === 0 ? pill("none","Not Yet Due") : p === 100 ? pill("ok","On Track") : p >= 85 ? pill("warn","Attention") : pill("bad","Behind")) + '</td></tr>';
}
function schoolTag(row){ return state.school === "DISTRICT" ? row.school + " &middot; " : ""; }

function teacherTable(rows, compact){
  var q = state.search.toLowerCase();
  var showSchool = state.school === "DISTRICT";
  var html = '<div class="table-shell"><table><thead><tr>'
    + (showSchool ? '<th>School</th>' : '')
    + '<th>Teacher / Grade</th><th>Subject</th><th>Plans</th><th>Assessments</th><th>Test Talk</th><th>Status</th><th>Next Test Date</th></tr></thead><tbody>';
  var shown = 0;
  rows.forEach(function(r){
    var a = rowAgg(r);
    if(state.filter === "flagged" && a.worst === "ok") return;
    if(q && (r.label + " " + r.subject + " " + r.sub).toLowerCase().indexOf(q) === -1) return;
    shown++;
    html += '<tr>'
      + (showSchool ? '<td class="cell-sub">' + esc(r.school) + '</td>' : '')
      + '<td class="cell-name">' + esc(r.label) + (r.sub ? ' <span class="cell-sub">&middot; ' + esc(r.sub) + '</span>' : '') + '</td>'
      + '<td class="cell-sub">' + esc(r.subject) + '</td>'
      + '<td class="num">' + a.plans + ' / ' + a.active + '</td>'
      + '<td class="num">' + a.assess + ' / ' + a.active + '</td>'
      + '<td class="num">' + (a.ttTracked ? a.ttDone + ' / ' + a.ttDue : '<span class="mark-none">&mdash;</span>') + '</td>'
      + '<td>' + statusPill(a.worst) + '</td>'
      + '<td class="num">' + (a.next ? fmtDate(a.next) : '<span class="cell-sub">&mdash;</span>') + '</td></tr>';
  });
  if(!shown) html += '<tr><td colspan="8" class="empty-note" style="padding:18px">Nothing matches.</td></tr>';
  html += '</tbody></table></div>';
  return (compact ? '' : toolbarHtml(["all","flagged"], {all:"All", flagged:"Needs attention"})) + html;
}

function viewTeachers(){
  return '<div class="section"><div class="section-title">Teachers</div>' + teacherTable(scopeRows(), false) + '</div>'
    + '<div class="banner">When a teacher falls behind on unit or assessment submission, the principal provides support, intervention, and follow-up. The purpose is proactive support, not reactive accountability.</div>';
}

function viewUnits(){
  var units = collectUnits(scopeRows());
  var q = state.search.toLowerCase();
  var showSchool = state.school === "DISTRICT";
  var html = toolbarHtml(["all","incomplete","ready"], {all:"All", incomplete:"Incomplete", ready:"Ready"});
  html += '<div class="table-shell"><table><thead><tr>'
    + (showSchool ? '<th>School</th>' : '')
    + '<th>Teacher / Grade</th><th>Unit</th><th>Test Date</th><th>Plan</th><th>Assessment</th><th>Status</th></tr></thead><tbody>';
  var shown = 0;
  units.sort(function(a,b){ return (a.u.date || Infinity) - (b.u.date || Infinity); });
  units.forEach(function(x){
    if(state.filter === "incomplete" && x.s.complete) return;
    if(state.filter === "ready" && !x.s.complete) return;
    if(q && (x.row.label + " " + x.row.subject).toLowerCase().indexOf(q) === -1) return;
    shown++;
    html += '<tr>'
      + (showSchool ? '<td class="cell-sub">' + esc(x.row.school) + '</td>' : '')
      + '<td class="cell-name">' + esc(x.row.label) + '</td>'
      + '<td class="num">Unit ' + x.u.n + '</td>'
      + '<td class="num">' + (x.u.date ? fmtDate(x.u.date) : '<span class="cell-sub">&mdash;</span>') + '</td>'
      + '<td>' + mark(x.u.plan) + '</td>'
      + '<td>' + mark(x.u.assess) + '</td>'
      + '<td>' + pill(x.s.complete ? "ok" : x.s.cls === "none" ? "none" : x.s.cls, x.s.complete ? "Ready" : x.s.label) + '</td></tr>';
  });
  if(!shown) html += '<tr><td colspan="7" class="empty-note" style="padding:18px">Nothing matches.</td></tr>';
  html += '</tbody></table></div>';
  return '<div class="section"><div class="section-title">Units</div>' + html + '</div>'
    + '<div class="banner">A missing unit assessment is not a paperwork problem. It signals that instruction may be planned without a clear picture of where students need to arrive. Both the plan <b>and</b> the assessment must be present before instruction begins.</div>';
}

function viewAssessments(){
  var units = collectUnits(scopeRows());
  var q = state.search.toLowerCase();
  var showSchool = state.school === "DISTRICT";
  var html = toolbarHtml(["all","missing"], {all:"All", missing:"Missing"});
  html += '<div class="table-shell"><table><thead><tr>'
    + (showSchool ? '<th>School</th>' : '')
    + '<th>Teacher / Grade</th><th>Unit</th><th>Test Date</th><th>Submitted</th><th>Status</th></tr></thead><tbody>';
  var shown = 0;
  units.sort(function(a,b){ return (a.u.date || Infinity) - (b.u.date || Infinity); });
  units.forEach(function(x){
    if(state.filter === "missing" && x.u.assess) return;
    if(q && (x.row.label + " " + x.row.subject).toLowerCase().indexOf(q) === -1) return;
    shown++;
    var st;
    if(x.u.assess) st = pill("ok","Submitted");
    else if(x.u.date && daysUntil(x.u.date) < 0) st = pill("bad","Overdue");
    else if(x.u.date && daysUntil(x.u.date) <= DUE_SOON_DAYS) st = pill("warn","Due Soon");
    else st = pill("none","Upcoming");
    html += '<tr>'
      + (showSchool ? '<td class="cell-sub">' + esc(x.row.school) + '</td>' : '')
      + '<td class="cell-name">' + esc(x.row.label) + '</td>'
      + '<td class="num">Unit ' + x.u.n + '</td>'
      + '<td class="num">' + (x.u.date ? fmtDate(x.u.date) : '<span class="cell-sub">&mdash;</span>') + '</td>'
      + '<td>' + mark(x.u.assess) + '</td>'
      + '<td>' + st + '</td></tr>';
  });
  if(!shown) html += '<tr><td colspan="6" class="empty-note" style="padding:18px">Nothing matches.</td></tr>';
  html += '</tbody></table></div>';
  return '<div class="section"><div class="section-title">Assessments</div>' + html + '</div>'
    + '<div class="banner">Unit design begins with the assessment, so assessment submission is tracked as a distinct and required step, separate from the unit plan.</div>';
}

function viewTestTalk(){
  var units = collectUnits(scopeRows()).filter(function(x){
    return x.u.tt !== null && x.u.date && daysUntil(x.u.date) < 0;
  });
  var q = state.search.toLowerCase();
  var showSchool = state.school === "DISTRICT";
  var html = toolbarHtml(["all","pending"], {all:"All", pending:"Pending"});
  html += '<div class="table-shell"><table><thead><tr>'
    + (showSchool ? '<th>School</th>' : '')
    + '<th>Teacher / Grade</th><th>Unit</th><th>Administered</th><th>Test Talk</th><th>Status</th></tr></thead><tbody>';
  var shown = 0;
  units.sort(function(a,b){ return b.u.date - a.u.date; });
  units.forEach(function(x){
    if(state.filter === "pending" && x.u.tt === true) return;
    if(q && (x.row.label + " " + x.row.subject).toLowerCase().indexOf(q) === -1) return;
    shown++;
    html += '<tr>'
      + (showSchool ? '<td class="cell-sub">' + esc(x.row.school) + '</td>' : '')
      + '<td class="cell-name">' + esc(x.row.label) + '</td>'
      + '<td class="num">Unit ' + x.u.n + '</td>'
      + '<td class="num">' + fmtDate(x.u.date) + '</td>'
      + '<td>' + mark(x.u.tt === true) + '</td>'
      + '<td>' + (x.u.tt === true ? pill("ok","Complete") : pill("warn","Pending")) + '</td></tr>';
  });
  if(!shown) html += '<tr><td colspan="6" class="empty-note" style="padding:18px">No administered units yet' + (state.school === "MCMS" ? ' (Test Talk is not tracked on the MCMS tab of the workbook yet)' : '') + '.</td></tr>';
  html += '</tbody></table></div>';
  var note = state.school === "MCMS" || state.school === "DISTRICT"
    ? '<div class="banner"><b>Note:</b> the MCMS tab of the curriculum map workbook does not have a Test Talk column yet, so MCMS units cannot appear here until one is added.</div>' : '';
  return '<div class="section"><div class="section-title">Test Talk</div>' + html + '</div>' + note;
}

/* ---------------- toolbar / events ---------------- */
function toolbarHtml(keys, labels){
  var h = '<div class="toolbar">';
  keys.forEach(function(k){
    h += '<button data-filter="' + k + '" class="' + (state.filter === k ? 'active' : '') + '">' + labels[k] + '</button>';
  });
  h += '<input type="search" id="searchBox" placeholder="Search teachers..." value="' + esc(state.search) + '"></div>';
  return h;
}
function bindToolbar(){
  document.querySelectorAll("[data-filter]").forEach(function(b){
    b.addEventListener("click", function(){ state.filter = b.getAttribute("data-filter"); draw(); });
  });
  var s = document.getElementById("searchBox");
  if(s){
    s.addEventListener("input", function(){
      state.search = s.value;
      draw();
      var s2 = document.getElementById("searchBox");
      if(s2){ s2.focus(); s2.setSelectionRange(s2.value.length, s2.value.length); }
    });
  }
}
document.getElementById("selector").addEventListener("click", function(e){
  var b = e.target.closest("button"); if(!b) return;
  state.school = b.getAttribute("data-school");
  document.querySelectorAll("#selector button").forEach(function(x){ x.classList.toggle("active", x === b); });
  draw();
});
document.getElementById("viewtabs").addEventListener("click", function(e){
  var b = e.target.closest("button"); if(!b) return;
  state.view = b.getAttribute("data-view");
  state.filter = "all"; state.search = "";
  document.querySelectorAll("#viewtabs button").forEach(function(x){ x.classList.toggle("active", x === b); });
  draw();
});
document.getElementById("refreshBtn").addEventListener("click", load);
setInterval(load, 15 * 60 * 1000);

/* ---------------- state cards ---------------- */
function loadingCard(){
  return '<div class="state-card"><div class="spinner"></div><h2>Loading</h2><p>Pulling live data from the curriculum map workbook.</p></div>';
}
function errorCard(msg){
  return '<div class="state-card"><h2>Could Not Load Data</h2>'
    + '<p>' + esc(msg) + '</p>'
    + '<p>Check that the Apps Script deployment is set to "Anyone" and the URL in this file is current.</p>'
    + '<button onclick="load()">Try Again</button> '
    + '<button onclick="loadSample()">Preview With Sample Data</button></div>';
}

/* ---------------- sample data (demo mode) ---------------- */

      { subject:"Science", teacherGrade:"Ms. Lee - 8", units:[{plan:"x",date:d(-30),test:"x"},{plan:"",date:d(-2),test:""},{plan:"x",date:d(30),test:"x"}] }
    ],

      { subject:"ELA", grade:"Kindergarten", units:[{test:"x",date:d(-12),shared:"x",bwd:"x",testTalk:true},{test:"x",date:d(10),shared:"x",bwd:"",testTalk:false}] },
      { subject:"Math", grade:"3rd Grade", units:[{test:"",date:d(6),shared:"x",bwd:"x",testTalk:false},{test:"x",date:d(35),shared:"x",bwd:"",testTalk:false}] }

loadLogos();
load();
</script>
